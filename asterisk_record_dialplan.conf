; =============================================================================
; Asterisk Dialplan for Outbound Call Recorder
; =============================================================================
; Records ONLY the far-end audio (what the called party says)
; Uses Monitor() application
;
; Variables passed from AMI Originate:
;   RECORD_FILE    - Base filename (without extension)
;   RECORD_SECONDS - How many seconds to record
;   OUTPUT_DIR     - Directory to save recordings
;
; Add to /etc/asterisk/extensions_custom.conf
; =============================================================================

[record-greeting]
exten => s,1,NoOp(=== Outbound Recording - Far End Only ===)
 same => n,NoOp(Recording to: ${OUTPUT_DIR}/${RECORD_FILE})
 same => n,NoOp(Duration: ${RECORD_SECONDS} seconds)

; Set defaults if not provided
 same => n,Set(RECORD_SECONDS=${IF($["${RECORD_SECONDS}" = ""]?5:${RECORD_SECONDS})})
 same => n,Set(OUTPUT_DIR=${IF($["${OUTPUT_DIR}" = ""]?/var/recordings:${OUTPUT_DIR})})
 same => n,Set(RECORD_FILE=${IF($["${RECORD_FILE}" = ""]?${UNIQUEID}:${RECORD_FILE})})

; Set the monitor format
 same => n,Set(MONITOR_FILE=${OUTPUT_DIR}/${RECORD_FILE})

; Answer and settle
 same => n,Answer()
 same => n,Wait(0.3)

; Monitor() options:
;   o = record only the RX stream (far end / incoming audio)
;   Format: wav
;   No mix (we only want one channel)
 same => n,Monitor(wav,${MONITOR_FILE},o)

; Wait for recording duration
 same => n,Wait(${RECORD_SECONDS})

; Stop and hangup
 same => n,StopMonitor()
 same => n,NoOp(=== Recording Complete: ${MONITOR_FILE}.wav ===)
 same => n,Hangup()

; Handle remote hangup
exten => h,1,NoOp(=== Remote Hangup ===)
 same => n,StopMonitor()
